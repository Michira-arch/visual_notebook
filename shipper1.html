<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shipper: The Deliverable-Focused Manager (Neumorphic)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- Neumorphic Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-text-muted); }
        
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }

        /* --- Theme Colors --- */
        body {
            /* Default to light theme - Updated to softer, lighter style */
            --color-bg: #EBF0F5;
            --color-text-base: #374151;
            --color-text-muted: #6B7280;
            --color-text-heading: #1F2937;
            --color-shadow-dark: #D1D9E6;
            --color-shadow-light: #FFFFFF;
            --color-scrollbar-thumb: #D1D5DB;

            --color-text-accent: #3D8BFD; /* Softer blue */
            --color-text-accent-hover: #2a7aF0;
            --color-text-accent-green: #059669;
            --color-text-accent-red: #DC2626; /* red-600 */
            --color-text-accent-purple: #9333EA; /* purple-600 */
            --color-text-accent-yellow: #D97706;

            --color-bg-accent: #3D8BFD; /* Softer blue */
            --color-bg-progress-track: #D1D5DB;

            --color-chart-text: #374151;
            --color-chart-grid: #D1D5DB;
        }

        body.theme-dark {
            /* Updated dark theme for softer shadows */
            --color-bg: #2B3038;
            --color-text-base: #D1D5DB;
            --color-text-muted: #9CA3AF;
            --color-text-heading: #F9FAFB;
            --color-shadow-dark: #212529;
            --color-shadow-light: #353B43;
            --color-scrollbar-thumb: #4B5563;

            --color-text-accent: #60A5FA; /* blue-400 */
            --color-text-accent-hover: #93C5FD; /* blue-300 */
            --color-text-accent-green: #34D399; /* green-400 */
            --color-text-accent-red: #F87171; /* red-400 */
            --color-text-accent-purple: #C084FC; /* purple-400 */
            --color-text-accent-yellow: #FBBF24; /* yellow-400 */

            --color-bg-accent: #60A5FA; /* blue-400 */
            --color-bg-progress-track: #4B5563;

            --color-chart-text: #D1D5DB;
            --color-chart-grid: #4B5563;
        }

        /* Base body styles */
        body {
            background-color: var(--color-bg);
            color: var(--color-text-base);
            transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out;
        }
        
        /* --- Neumorphic CSS Classes --- */
        .neum-card {
            background: var(--color-bg);
            box-shadow: 5px 5px 10px var(--color-shadow-dark), -5px -5px 10px var(--color-shadow-light);
            transition: all 0.2s ease-in-out;
        }
        .neum-inset {
            background: var(--color-bg);
            box-shadow: inset 5px 5px 10px var(--color-shadow-dark), inset -5px -5px 10px var(--color-shadow-light);
            transition: all 0.2s ease-in-out;
        }
        .neum-button {
            background: var(--color-bg);
            box-shadow: 4px 4px 8px var(--color-shadow-dark), -4px -4px 8px var(--color-shadow-light);
            transition: all 0.15s ease-in-out;
            color: var(--color-text-muted);
        }
        .neum-button:active, .neum-button-active {
            box-shadow: inset 4px 4px 8px var(--color-shadow-dark), inset -4px -4px 8px var(--color-shadow-light);
            color: var(--color-text-accent);
        }
        .neum-icon-button {
            width: 2.5rem; /* 40px */
            height: 2.5rem; /* 40px */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--color-bg);
            box-shadow: 4px 4px 8px var(--color-shadow-dark), -4px -4px 8px var(--color-shadow-light);
            transition: all 0.15s ease-in-out;
            color: var(--color-text-muted);
        }
        .neum-icon-button:active, .neum-icon-button-active {
            box-shadow: inset 4px 4px 8px var(--color-shadow-dark), inset -4px -4px 8px var(--color-shadow-light);
            color: var(--color-text-accent);
        }

        .neum-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 50%;
            background: var(--color-bg);
            box-shadow: 6px 6px 12px var(--color-shadow-dark), -6px -6px 12px var(--color-shadow-light);
            transition: all 0.2s ease-in-out;
        }
        .neum-circle:active {
            box-shadow: inset 6px 6px 12px var(--color-shadow-dark), inset -6px -6px 12px var(--color-shadow-light);
        }
 
        /* --- Custom Text Color Classes --- */
        .text-skin-base { color: var(--color-text-base); }
        .text-skin-muted { color: var(--color-text-muted); }
        .text-skin-heading { color: var(--color-text-heading); }
        .text-skin-accent { color: var(--color-text-accent); }
        .text-skin-accent-green { color: var(--color-text-accent-green); }
        .text-skin-accent-red { color: var(--color-text-accent-red); }
        .text-skin-accent-purple { color: var(--color-text-accent-purple); }
        .text-skin-accent-yellow { color: var(--color-text-accent-yellow); }
        .hover\:text-skin-accent-hover:hover { color: var(--color-text-accent-hover); }

        .bg-skin-accent { background-color: var(--color-bg-accent); }
        .bg-skin-progress-track { background-color: var(--color-bg-progress-track); }

        .border-skin-accent-green { border-color: var(--color-text-accent-green); }
        .border-skin-accent-blue { border-color: var(--color-text-accent); }
        .border-skin-accent-yellow { border-color: var(--color-text-accent-yellow); }
        .border-skin-accent-red { border-color: var(--color-text-accent-red); }
        .border-skin-divider { border-color: var(--color-shadow-dark); }
        
        /* Custom range input */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: var(--color-bg);
            box-shadow: inset 2px 2px 4px var(--color-shadow-dark), inset -2px -2px 4px var(--color-shadow-light);
            border-radius: 4px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--color-bg-accent);
            cursor: pointer;
            box-shadow: 3px 3px 6px var(--color-shadow-dark), -3px -3px 6px var(--color-shadow-light);
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--color-bg-accent);
            cursor: pointer;
            border: none;
            box-shadow: 3px 3px 6px var(--color-shadow-dark), -3px -3px 6px var(--color-shadow-light);
        }

        /* --- Custom Form Input Styling (to match image) --- */
        .neum-form-inset {
            background: var(--color-bg);
            box-shadow: inset 4px 4px 8px var(--color-shadow-dark), inset -4px -4px 8px var(--color-shadow-light);
            border: none;
            outline: none;
            border-radius: 0.5rem; /* 8px */
            padding: 0.5rem 0.75rem; /* py-2 px-3 */
            color: var(--color-text-base);
            width: 100%;
        }
        .neum-form-inset::placeholder {
            color: var(--color-text-muted);
        }
        
        /* --- Custom Toggle Switch (to match image) --- */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px; /* Width of the toggle */
            height: 28px; /* Height of the toggle */
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--color-bg);
            box-shadow: inset 3px 3px 6px var(--color-shadow-dark), inset -3px -3px 6px var(--color-shadow-light);
            transition: .4s;
            border-radius: 28px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px; /* Height of the knob */
            width: 20px; /* Width of the knob */
            left: 4px;
            bottom: 4px;
            background-color: var(--color-bg);
            box-shadow: 2px 2px 4px var(--color-shadow-dark), -2px -2px 4px var(--color-shadow-light);
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider {
            background-color: var(--color-bg-accent);
            box-shadow: none; /* Flat when active */
        }
        input:checked + .toggle-slider:before {
            transform: translateX(22px); /* Move knob to the right */
            background-color: #FFFFFF; /* White knob when active */
            box-shadow: 0 0 2px rgba(0,0,0,0.2);
        }

    </style>
</head>

        /**
         * Saves the current state to localStorage.
        */
        function saveState() {
            try {
                const serializedState = JSON.stringify(state);
                localStorage.setItem('shipperAppState', serializedState);
            } catch (e) {
                console.error("Could not save state", e);
            }
        }

        /**
         * Loads the state from localStorage, or returns the default state.
        */
        function loadState() {
            try {
                const serializedState = localStorage.getItem('shipperAppState');
                if (serializedState === null) {
                    return defaultState;
                }
                // Merge loaded state with defaults to ensure new properties like 'theme' are present
                return { ...defaultState, ...JSON.parse(serializedState) };
            } catch (e) {
                console.error("Could not load state", e);
                return defaultState;
            }
        }

        let state = loadState();

        // --- CORE LOGIC & UTILITIES ---

        /**
         * Generates a changelog using the Gemini API based on completed tasks.
         */
        async function generateChangelog(tasks) {
            const completedFeatures = tasks.filter(t => t.type === TaskType.Feature).map(t => `- ${t.title}`).join('\n');
            const completedBugFixes = tasks.filter(t => t.type === TaskType.Bug).map(t => `- ${t.title}`).join('\n');
            
            const systemPrompt = "You are an expert technical writer creating a changelog. Based on the provided tasks, generate a concise and user-friendly changelog in Markdown format. Use '### ✨ New Features' and '### 🐛 Bug Fixes' sections. Omit empty sections. The tone should be celebratory but professional. You only output Markdown.";
            const userQuery = `Completed Features:\n${completedFeatures || 'None'}\n\nCompleted Bug Fixes:\n${completedBugFixes || 'None'}\n\nGenerate the changelog now.`;

            return new Promise((resolve) => {
                const messageId = Math.random().toString(36).substring(7);
                
                const handler = (event) => {
                    if (event.data?.type === 'SHIPPER_AI_RESPONSE' && event.data.id === messageId) {
                        window.removeEventListener('message', handler);
                        if (event.data.error) {
                            console.error("Error generating changelog:", event.data.error);
                            resolve("### ✨ New Features\n" + (completedFeatures || "No new features") + "\n\n### 🐛 Bug Fixes\n" + (completedBugFixes || "No bug fixes"));
                        } else {
                            resolve(event.data.text);
                        }
                    }
                };
                
                window.addEventListener('message', handler);
                window.parent.postMessage({
                    type: 'SHIPPER_AI_REQUEST',
                    id: messageId,
                    systemPrompt,
                    userQuery
                }, '*');
            });
        }
        
        /**
         * Determines the priority bucket for a task based on impact and effort.
         */
        const getPriorityBucket = (task) => {
            if (task.impact >= 4 && task.effort <= 2) return PriorityBucket.QuickWin;
            if (task.impact >= 4 && task.effort > 2) return PriorityBucket.MajorBuild;
            if (task.impact < 4 && task.effort <= 2) return PriorityBucket.FillIn;
            return PriorityBucket.TimeSink;
        };

        const AppContainer = document.getElementById('app');

                            <div class="flex flex-col">
                                <span class="text-sm font-semibold text-skin-base">${task.type}</span>

                    </div>
                </div>
            </div>`;
        }

        /**
         * Renders the main dashboard view.
         */
        function renderDashboard() {
            const priorityBucketOrder = { [PriorityBucket.QuickWin]: 1, [PriorityBucket.MajorBuild]: 2, [PriorityBucket.FillIn]: 3, [PriorityBucket.TimeSink]: 4 };
            
            // Get top 5 "To Do" tasks, sorted by priority
            const whatsNextTasks = state.tasks
                .filter(task => task.status === TaskStatus.ToDo && !task.isBlocked)
                .sort((a, b) => {
                    const bucketA = priorityBucketOrder[getPriorityBucket(a)];
                    const bucketB = priorityBucketOrder[getPriorityBucket(b)];
                    return bucketA !== bucketB ? bucketA - bucketB : b.impact - a.impact;
                })
                .slice(0, 5);

            const blockedTasks = state.tasks.filter(t => t.isBlocked && t.status !== TaskStatus.Done);

            return `
            <main class="p-4 sm:p-6 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">

                    <div>
                        <h2 class="text-2xl font-bold mb-4 text-skin-heading">🚀 Active Deliverables</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${state.deliverables.map(d => {
                                const tasks = state.tasks.filter(t => t.deliverableId === d.id);
                                const doneTasks = tasks.filter(t => t.status === TaskStatus.Done).length;
                                const progress = tasks.length > 0 ? Math.round((doneTasks / tasks.length) * 100) : 0;
                                return `
                                <div data-action="select-deliverable" data-id="${d.id}" class="neum-card p-4 rounded-lg cursor-pointer hover:neum-inset">

                                        </div>

                                <div class="text-center text-skin-muted">
                                    ${Icons.Plus('h-6 w-6 mb-1')}

                        <h2 class="text-2xl font-bold mb-4">📝 What\'s Next?</h2>
                        <textarea id="reasoning-pad-textarea" class="w-full neum-inset border-none rounded-md shadow-sm py-2 px-3 text-gray-700 focus:outline-none h-[calc(100vh-23rem)]" placeholder="Based on what\'s done, what\'s the next logical step? What are the risks? What\'s the opportunity?">${reasoningText}</textarea>
                        <div class="flex justify-end gap-2 mt-4">
                            <button data-action="clear-reasoning-pad" class="neum-button text-gray-700 font-semibold py-2 px-4 rounded-lg">Clear</button>
                            <button data-action="save-reasoning-pad" class="neum-button text-blue-600 font-semibold py-2 px-4 rounded-lg">Save</button>
                        </div>
                    </div>
                </div>
            </main>`;
        }


        // --- RENDER FUNCTIONS (MODALS & FORMS) ---

        /**
         * Renders a modal shell with given title and content.
         */
        function renderModal(title, content) {
            const modalHTML = `
            <div id="modal-backdrop" class="fixed inset-0 bg-transparent z-40" data-action="close-modal"></div>
            <div id="modal-content" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 neum-card rounded-lg z-50 w-full max-w-lg animate-slide-in">
                <div class="flex justify-between items-center p-4">
                    <h3 class="text-xl font-bold text-skin-heading">${title}</h3>
                    <button data-action="close-modal" class="text-skin-muted hover:text-skin-base">${Icons.Close()}</button>
                </div>
                <div class="p-6 pt-2">${content}</div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        /**
         * Closes any active modal.
         */
        function closeModal() {
            document.getElementById('modal-backdrop')?.remove();
            document.getElementById('modal-content')?.remove();
        }

        /**
         * Renders the form for creating/editing a task.
         */
        function renderTaskForm(task = {}, deliverableId = null) {
            const isEditing = !!task.id;
            const taskId = task.id || `t${Date.now()}`;
            const title = task.title || '';
            const type = task.type || TaskType.Feature;
            const status = task.status || TaskStatus.Backlog;
            const impact = task.impact || 3;
            const effort = task.effort || 3;
            const isBlocked = task.isBlocked || false;
            const blockerReason = task.blockerReason || '';
            const taskDeliverableId = task.deliverableId || deliverableId || state.selectedDeliverableId;
            
            const formContent = `
            <form id="task-form" data-action="submit-task-form" data-id="${taskId}">
                <input type="hidden" name="deliverableId" value="${taskDeliverableId}">
                <div class="space-y-4">
                    <div>
                        <label for="title" class="block text-sm font-medium text-skin-muted mb-1">Title</label>
                        <input type="text" name="title" id="title" value="${title}" required class="neum-form-inset">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="type" class="block text-sm font-medium text-skin-muted mb-1">Type</label>
                            <select name="type" id="type" class="neum-form-inset">
                                ${Object.values(TaskType).map(t => `<option value="${t}" ${t === type ? 'selected' : ''}>${t}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label for="status" class="block text-sm font-medium text-skin-muted mb-1">Status</label>
                            <select name="status" id="status" class="neum-form-inset">
                                ${TASK_STATUS_ORDER.map(s => `<option value="${s}" ${s === status ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="impact" class="block text-sm font-medium text-skin-muted">Impact (1-5)</label>
                            <input type="range" name="impact" id="impact" min="1" max="5" value="${impact}" class="mt-1 block w-full">
                        </div>
                        <div>
                            <label for="effort" class="block text-sm font-medium text-skin-muted">Effort (1-5)</label>
                            <input type="range" name="effort" id="effort" min="1" max="5" value="${effort}" class="mt-1 block w-full">
                        </div>
                    </div>

                    <div>
                        <label class="flex items-center justify-between">
                            <span class="text-sm text-skin-muted">Is Blocked?</span>
                            <label class="toggle-switch">
                                <input type="checkbox" name="isBlocked" ${isBlocked ? 'checked' : ''}>
                                <span class="toggle-slider"></span>
                            </label>
                        </label>
                    </div>

                    <div id="blocker-reason-container" class="${isBlocked ? '' : 'hidden'}">
                        <label for="blockerReason" class="block text-sm font-medium text-skin-muted mb-1">Blocker Reason</label>
                        <input type="text" name="blockerReason" id="blockerReason" value="${blockerReason}" class="neum-form-inset">
                    </div>
                    
                    <div class="flex justify-end pt-4 mt-4 border-t border-skin-divider">
                        <button type="button" data-action="close-modal" class="neum-button text-skin-base font-semibold py-2 px-4 rounded-lg mr-2">Cancel</button>
                        <button type="submit" class="neum-button text-skin-accent font-semibold py-2 px-4 rounded-lg">${isEditing ? 'Save Changes' : 'Create Task'}</button>
                    </div>
                </div>
            </form>
            `;
            renderModal(isEditing ? 'Edit Task' : 'New Task', formContent);

            // Add event listener to toggle blocker reason
            document.querySelector('input[name="isBlocked"]').addEventListener('change', (e) => {
                document.getElementById('blocker-reason-container').classList.toggle('hidden', !e.target.checked);
            });
        }

        /**
         * Renders the form for creating a new deliverable.
         */
        function renderDeliverableForm() {
            const formContent = `
            <form id="deliverable-form" data-action="submit-deliverable-form">
                <div class="space-y-4">
                    <div>
                        <label for="title" class="block text-sm font-medium text-skin-muted mb-1">Title</label>
                        <input type="text" name="title" id="title" required class="neum-form-inset">
                    </div>
                    <div>
                        <label for="targetAudience" class="block text-sm font-medium text-skin-muted mb-1">Target Audience</label>
                        <input type="text" name="targetAudience" id="targetAudience" required class="neum-form-inset" placeholder="e.g., Internal Users, Client X">
                    </div>
                    <div>
                        <label for="finalFormat" class="block text-sm font-medium text-skin-muted mb-1">Final Format</label>
                        <input type="text" name="finalFormat" id="finalFormat" required class="neum-form-inset" placeholder="e.g., Web App, PDF Report, API Endpoint">
                    </div>
                    <div>
                        <label for="definitionOfDone" class="block text-sm font-medium text-skin-muted mb-1">Definition of Done</label>
                        <textarea name="definitionOfDone" id="definitionOfDone" rows="3" required class="neum-form-inset" placeholder="What does 'done' look like?"></textarea>
                    </div>
                    
                    <div class="flex justify-end pt-4 mt-4 border-t border-skin-divider">
                        <button type="button" data-action="close-modal" class="neum-button text-skin-base font-semibold py-2 px-4 rounded-lg mr-2">Cancel</button>
                        <button type="submit" class="neum-button text-skin-accent font-semibold py-2 px-4 rounded-lg">Create Deliverable</button>
                    </div>
                </div>
            </form>
            `;
            renderModal('New Deliverable', formContent);
        }

        /**
         * Renders the modal for shipping a deliverable.
         */
        async function renderShipModal(deliverable) {
            const tasks = state.tasks.filter(t => t.deliverableId === deliverable.id);
            const title = `Ship "${deliverable.title}"?`;
            
            let modalContent = `
            <form id="ship-form" data-action="ship-it" data-id="${deliverable.id}">
                <p class="text-skin-muted mb-4">You're about to ship this deliverable. Let's automatically generate the changelog using Visual Notebook's AI providers.</p>
                <div id="changelog-container" class="hidden mt-4">
                    <div class="text-center p-8">
                        <p class="text-lg text-skin-muted">Generating changelog...</p>
                        <div class="mt-4 h-8 w-8 border-4 border-skin-accent border-t-transparent rounded-full animate-spin mx-auto"></div>
                    </div>
                </div>
                <div class="flex justify-end pt-4 mt-4 border-t border-skin-divider">
                    <button type="button" data-action="close-modal" class="neum-button text-skin-base font-semibold py-2 px-4 rounded-lg mr-2">Cancel</button>
                    <button type="button" id="generate-changelog-btn" class="neum-button text-skin-accent font-semibold py-2 px-4 rounded-lg">Generate Changelog</button>
                    <button type="submit" id="ship-it-btn" class="neum-button text-skin-accent-green font-bold py-2 px-4 rounded-lg flex items-center hidden">${Icons.Ship()}Ship It!</button>
                </div>
            </form>
            `;
            renderModal(title, modalContent);

            document.getElementById('generate-changelog-btn').addEventListener('click', async () => {
                document.getElementById('changelog-container').classList.remove('hidden');
                document.getElementById('generate-changelog-btn').classList.add('hidden');

                const changelog = await generateChangelog(tasks);

                document.getElementById('changelog-container').innerHTML = `
                    <label for="changelog" class="block text-sm font-medium text-skin-muted mb-1">Changelog (Editable)</label>
                    <textarea name="changelog" id="changelog" rows="10" class="mt-1 block w-full neum-form-inset">${changelog}</textarea>
                `;

                document.getElementById('ship-it-btn').classList.remove('hidden');
            });
        }


        // --- MAIN RENDER FUNCTION ---

        /**
         * The main application render function.
         * Wipes the #app container and redraws the UI based on state.
         */
        function render() {
            saveState();
            // Set the theme on the body
            document.body.className = `theme-${state.theme} font-sans`;

            let content = renderHeader();
            
            switch (state.currentView) {
                case 'home':
                    content += renderHome();
                    // We must wait for the DOM to update before rendering the chart
                    setTimeout(() => {
                        const tasks = state.tasks;
                        const statusCounts = TASK_STATUS_ORDER.map(status => tasks.filter(t => t.status === status).length);
                        const homeChartEl = document.getElementById('homeAnalyticsChart');
                        
                        if (homeChartEl) {
                            new Chart(homeChartEl, {
                                type: 'doughnut',
                                data: {
                                    labels: TASK_STATUS_ORDER,
                                    datasets: [{
                                        data: statusCounts,
                                        backgroundColor: ['#6B7280', '#3B82F6', '#A855F7', '#10B981', '#16A34A'],
                                        borderWidth: 0,
                                    }]
                                },
                                options: { 
                                    plugins: { 
                                        legend: { display: false },
                                        tooltip: { enabled: true }
                                    },
                                    responsive: true,
                                    maintainAspectRatio: false,
                                }
                            });
                        }
                    }, 0);
                    break;
                case 'dashboard':
                    content += renderDashboard();
                    break;
                case 'deliverable':
                    content += renderDeliverableDetail();
                    break;
                case 'analytics':
                    content += renderAnalytics();
                    break;
                case 'hallOfFame':
                    content += renderHallOfFame();
                    break;
                case 'reasoningPad':
                    content += renderReasoningPad();
                    break;
                default:
                    content += renderDashboard();
            }
            
            AppContainer.innerHTML = content;
        }


        // --- EVENT HANDLERS & LISTENERS ---

        /**
         * Handles all click events via event delegation.
         */
        document.addEventListener('click', (e) => {
            const actionTarget = e.target.closest('[data-action]');
            if (!actionTarget) return;

            const action = actionTarget.dataset.action;
            const id = actionTarget.dataset.id;

            // Apply active state to buttons
            if (actionTarget.classList.contains('neum-button') || actionTarget.classList.contains('neum-icon-button')) {
                actionTarget.classList.add('neum-button-active');
                setTimeout(() => actionTarget.classList.remove('neum-button-active'), 150);
            }

            switch (action) {
                case 'navigate':
                    state.currentView = actionTarget.dataset.view;
                    if (state.currentView === 'dashboard' || state.currentView === 'home') {
                        state.selectedDeliverableId = null;
                    }
                    render();
                    break;
                
                case 'select-deliverable':
                    state.selectedDeliverableId = id;
                    state.currentView = 'deliverable';
                    render();
                    break;
                
                case 'add-deliverable':
                    renderDeliverableForm();
                    break;
                
                case 'add-task':
                    renderTaskForm({}, actionTarget.dataset.deliverableId);
                    break;

                case 'edit-task': {
                    const task = state.tasks.find(t => t.id === id);
                    if (task) renderTaskForm(task);
                    break;
                }
                
                case 'delete-task': {
                    const task = state.tasks.find(t => t.id === id);
                    if (task) {
                        const modalContent = `
                            <p class="text-skin-muted">Are you sure you want to delete this task?</p>
                            <p class="font-bold my-2 text-skin-heading">${task.title}</p>
                            <div class="flex justify-end pt-4 mt-4 border-t border-skin-divider">
                                <button type="button" data-action="close-modal" class="neum-button text-skin-base font-semibold py-2 px-4 rounded-lg mr-2">Cancel</button>
                                <button type="button" data-action="confirm-delete-task" data-id="${id}" class="neum-button text-skin-accent-red font-semibold py-2 px-4 rounded-lg">Delete</button>
                            </div>
                        `;
                        renderModal('Confirm Deletion', modalContent);
                    }
                    break;
                }

                case 'confirm-delete-task':
                    state.tasks = state.tasks.filter(t => t.id !== id);
                    closeModal();
                    render();
                    break;

                case 'update-task-status':
                    const task = state.tasks.find(t => t.id === id);
                    if (task) {
                        task.status = actionTarget.dataset.status;
                        render();
                    }
                    break;

                case 'add-triage-item': {
                    const modalContent = `
                        <form id="triage-form" data-action="submit-triage-form">
                            <label for="triage-text" class="block text-sm font-medium text-skin-muted mb-1">New Triage Item</label>
                            <textarea name="triage-text" id="triage-text" rows="3" required class="mt-1 block w-full neum-form-inset" placeholder="Enter new idea, bug report, or note..."></textarea>
                            <div class="flex justify-end pt-4 mt-4 border-t border-skin-divider">
                                <button type="button" data-action="close-modal" class="neum-button text-skin-base font-semibold py-2 px-4 rounded-lg mr-2">Cancel</button>
                                <button type="submit" class="neum-button text-skin-accent font-semibold py-2 px-4 rounded-lg">Add Item</button>
                            </div>
                        </form>
                    `;
                    renderModal('Add to Triage', modalContent);
                    break;
                }
                
                case 'delete-triage-item':
                    state.triageItems = state.triageItems.filter(item => item.id !== id);
                    render();
                    break;

                case 'open-ship-modal': {
                    const deliverable = state.deliverables.find(d => d.id === id);
                    if (deliverable) renderShipModal(deliverable);
                    break;
                }
                
                case 'close-modal':
                    closeModal();
                    break;

                case 'toggle-theme':
                    state.theme = state.theme === 'light' ? 'dark' : 'light';
                    render();
                    break;

                case 'save-reasoning-pad': {
                    const deliverableId = document.getElementById('reasoning-pad-deliverable-select').value;
                    const textarea = document.getElementById('reasoning-pad-textarea');
                    state.reasoningPads[deliverableId] = textarea.value;
                    render();
                    break;
                }
                case 'clear-reasoning-pad': {
                    const deliverableId = document.getElementById('reasoning-pad-deliverable-select').value;
                    const textarea = document.getElementById('reasoning-pad-textarea');
                    textarea.value = '';
                    delete state.reasoningPads[deliverableId];
                    render();
                    break;
                }
            }
        });

        document.addEventListener('change', (e) => {
            if (e.target.id === 'reasoning-pad-deliverable-select') {
                state.selectedDeliverableId = e.target.value;
                render();
            }
        });

        /**
         * Handles all form submissions.
         */
        document.addEventListener('submit', (e) => {
            const form = e.target;
            const action = form.dataset.action;
            if (!action) return;

            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            switch (action) {
                case 'submit-task-form': {
                    const id = form.dataset.id;
                    const existingTask = state.tasks.find(t => t.id === id);
                    
                    const taskData = {
                        id: id,
                        title: data.title,
                        deliverableId: data.deliverableId,
                        type: data.type,
                        status: data.status,
                        impact: parseInt(data.impact, 10),
                        effort: parseInt(data.effort, 10),
                        isBlocked: data.isBlocked === 'on',
                        blockerReason: data.isBlocked === 'on' ? data.blockerReason : '',
                    };

                    if (existingTask) {
                        // Update
                        Object.assign(existingTask, taskData);
                    } else {
                        // Create
                        state.tasks.push(taskData);
                    }
                    
                    closeModal();
                    render();
                    break;
                }

                case 'submit-deliverable-form': {
                    const newDeliverable = {
                        id: `d${Date.now()}`,
                        title: data.title,
                        targetAudience: data.targetAudience,
                        finalFormat: data.finalFormat,
                        definitionOfDone: data.definitionOfDone,
                    };
                    state.deliverables.push(newDeliverable);
                    closeModal();
                    render();
                    break;
                }

                case 'submit-triage-form': {
                    const text = data['triage-text'];
                    if (text) {
                        state.triageItems.push({ id: `tr${Date.now()}`, text: text });
                        closeModal();
                        render();
                    }
                    break;
                }

                case 'ship-it': {
                    const id = form.dataset.id;
                    const deliverableIndex = state.deliverables.findIndex(d => d.id === id);
                    if (deliverableIndex > -1) {
                        const [shippedDeliverable] = state.deliverables.splice(deliverableIndex, 1);
                        
                        // Add to Hall of Fame
                        shippedDeliverable.shippedDate = new Date().toLocaleDateString();
                        shippedDeliverable.changelog = data.changelog;
                        state.shippedDeliverables.unshift(shippedDeliverable);

                        // Remove associated tasks (or you could archive them)
                        state.tasks = state.tasks.filter(t => t.deliverableId !== id);

                        // Go to Hall of Fame
                        state.currentView = 'hallOfFame';
                        state.selectedDeliverableId = null;
                        closeModal();
                        render();
                    }
                    break;
                }
            }
        });


        // --- INITIALIZATION ---
        
        render(); // Initial app load

    </script>
</body>
</html>
